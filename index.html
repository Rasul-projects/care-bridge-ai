<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareBridge AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>CareBridge AI</h1>
        <p>Simplifying vital information for everyone.</p>
        <textarea id="inputField" placeholder="Paste complex medical/educational text here..."></textarea>
        <button onclick="processText()">Simplify & Translate</button>
        <div id="output" class="hidden">
            <h3>Result:</h3>
            <p id="resultText"></p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
